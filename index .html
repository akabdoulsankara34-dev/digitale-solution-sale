// ---- ATTENDRE QUE FIREBASE SOIT CHARGÉ ----
async function waitForFirebase() {
  return new Promise(resolve => {
    const check = () => {
      if (window.DB && window.Auth && window.ADB) {
        resolve();
      } else {
        setTimeout(check, 100);
      }
    };
    check();
  });
}

// ---- VARIABLES GLOBALES (uniquement UI) ----
let cart = [];
let currentSaleWA = '';
let currentSaleName = '';
let currentPrintFmt = 'a4';
let editProdId = null;
let editCliId = null;
let pinBuffer = '';
let pinTarget = '';
let pinUnlocked = false;
let pinUnlockTimer = null;
let currentMerchDetailId = null;
let currentPayFilter = 'pending';
let payState = { plan: null, operator: null, ref: null, transRef: null };

// ---- UTILS ----
function fmtMoney(n, dev) {
  const f = (parseFloat(n) || 0).toLocaleString('fr-FR', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
  const syms = { USD: '$', EUR: '€', GBP: '£', NGN: '₦' };
  return syms[dev] ? syms[dev] + f : f + ' ' + (dev || 'FCFA');
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg; 
  t.className = 'toast ' + (type || 'success'); 
  t.classList.remove('hidden');
  clearTimeout(t._t); 
  t._t = setTimeout(() => t.classList.add('hidden'), 4000);
}

function showAdminToast(msg, type) {
  showToast(msg, type);
}

// ---- THEME ----
function setTheme(t, el) {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('ds_theme', t);
  document.querySelectorAll('.tsw-pill,.tp').forEach(p => {
    p.classList.toggle('active', p.dataset.t === t);
  });
}

// ---- LICENCE ----
function getLicStatus(m) {
  if (!m) return { st: 'inactive', css: 'expired', lbl: 'Compte inactif' };
  if (m.licence === 'suspendue' || m.actif === false) 
    return { st: 'suspended', css: 'suspended', lbl: 'Licence suspendue' };
  
  if (m.licence_expiry) {
    const exp = new Date(m.licence_expiry);
    const now = new Date();
    const diffDays = Math.ceil((exp - now) / 86400000);
    
    if (now > exp) {
      const hoursAfter = (now - exp) / 3600000;
      if (hoursAfter <= 48) {
        return { st: 'grace', css: 'suspended', lbl: `Grâce ${Math.ceil(48 - hoursAfter)}h` };
      }
      return { st: 'expired', css: 'expired', lbl: 'Licence expirée' };
    }
    if (diffDays <= 3) return { st: 'active', css: '', lbl: `⚠️ Expire dans ${diffDays}j` };
    if (diffDays <= 7) return { st: 'active', css: '', lbl: `Expire dans ${diffDays}j` };
  }
  return { st: 'active', css: '', lbl: 'Licence active' };
}

function checkLicense(m) {
  const s = getLicStatus(m);
  const badge = document.getElementById('lic-badge');
  const text = document.getElementById('lic-text');
  if (badge) {
    badge.className = 'lic-badge ' + (s.css || '');
  }
  if (text) text.textContent = s.lbl;
  
  const expBanner = document.getElementById('lic-exp');
  if (expBanner) {
    expBanner.classList.toggle('hidden', s.st === 'active');
  }
}

// ---- CONFIG ----
async function getConfig() {
  const m = Auth.current();
  if (!m) return {};
  return await DB.getConfig(m.id) || {};
}

async function saveSetting(k, v) {
  const m = Auth.current();
  if (!m) return;
  await DB.upsertConfig(m.id, { [k]: v });
  showToast('✅ Sauvegardé', 'success');
}

// ---- PIN SYSTEM ----
function reqPin(section) {
  waitForFirebase().then(async () => {
    const m = Auth.current();
    if (!m) return;
    
    const lst = getLicStatus(m).st;
    if ((lst === 'expired' || lst === 'suspended') && section !== 'settings') {
      openPaymentPage();
      return;
    }
    
    const cfg = await getConfig();
    if (!cfg.pin_hash || cfg.pin_hash.length < 4 || pinUnlocked) {
      showSection(section);
      return;
    }
    
    pinTarget = section;
    pinBuffer = '';
    updatePinDots();
    document.getElementById('pin-err').textContent = '';
    document.getElementById('pin-modal-hint').textContent = 'Entrez votre PIN (4 chiffres) pour accéder à cette section.';
    document.getElementById('mo-pin').classList.remove('hidden');
  });
}

function pinKey(k) {
  if (pinBuffer.length >= 4) return;
  pinBuffer += k;
  updatePinDots();
  
  if (pinBuffer.length === 4) {
    waitForFirebase().then(async () => {
      const m = Auth.current();
      if (!m) return;
      const cfg = await getConfig();
      
      if (window._hash(pinBuffer) === cfg.pin_hash) {
        closeMo('mo-pin');
        pinUnlocked = true;
        clearTimeout(pinUnlockTimer);
        pinUnlockTimer = setTimeout(() => { pinUnlocked = false; }, 5 * 60 * 1000);
        showSection(pinTarget);
      } else {
        document.getElementById('pin-err').textContent = '❌ PIN incorrect. Réessayez.';
        setTimeout(() => { 
          pinBuffer = ''; 
          updatePinDots(); 
          document.getElementById('pin-err').textContent = ''; 
        }, 800);
      }
    });
  }
}

function pinDel() {
  pinBuffer = pinBuffer.slice(0, -1);
  updatePinDots();
}

function updatePinDots() {
  for (let i = 0; i < 4; i++) {
    const dot = document.getElementById('pd' + i);
    if (dot) dot.classList.toggle('filled', i < pinBuffer.length);
  }
}

async function savePin() {
  const np = document.getElementById('s-pin-new').value;
  const nc = document.getElementById('s-pin-conf').value;
  
  if (np.length !== 4 || !/^\d{4}$/.test(np)) { 
    showToast('⚠️ Le PIN doit être 4 chiffres', 'error'); 
    return; 
  }
  if (np !== nc) { 
    showToast('⚠️ Les PINs ne correspondent pas', 'error'); 
    return; 
  }
  
  const m = Auth.current(); 
  if (!m) return;
  
  await DB.upsertConfig(m.id, { pin_hash: window._hash(np) });
  
  document.getElementById('s-pin-new').value = '';
  document.getElementById('s-pin-conf').value = '';
  pinUnlocked = true;
  showToast('✅ PIN enregistré avec succès', 'success');
}

// ---- NAVIGATION ----
function showSection(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.ni').forEach(n => n.classList.remove('active'));
  
  const section = document.getElementById('s-' + name);
  if (section) section.classList.add('active');
  
  const navItem = document.querySelector('[data-s="' + name + '"]');
  if (navItem) navItem.classList.add('active');
  
  const titles = { dashboard: 'Dashboard', pos: 'Point de Vente', products: 'Produits', 
                   clients: 'Clients', sales: 'Ventes', settings: 'Paramètres' };
  const titleEl = document.getElementById('tb-title');
  if (titleEl) titleEl.textContent = titles[name] || name;
  
  document.getElementById('sidebar')?.classList.remove('mob-open');
  
  const renderers = {
    dashboard: renderDashboard,
    pos: renderPOS,
    products: renderProducts,
    clients: renderClients,
    sales: renderSales,
    settings: renderSettings
  };
  
  if (renderers[name]) renderers[name]();
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const target = document.getElementById(id);
  if (target) target.classList.add('active');
  
  if (id === 'page-app') initApp();
  if (id === 'page-admin') {
    // La vérification admin se fait dans DOMContentLoaded
  }
  if (id === 'page-payment') {
    const theme = localStorage.getItem('ds_theme') || 'dark';
    document.documentElement.setAttribute('data-theme', theme);
  }
}

function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  if (!sb) return;
  window.innerWidth <= 900 ? sb.classList.toggle('mob-open') : sb.classList.toggle('coll');
}

// ---- DASHBOARD ----
async function renderDashboard() {
  const m = Auth.current(); 
  if (!m) return;
  
  const sales = await DB.forM('sales', m.id);
  const prods = await DB.forM('products', m.id);
  const clis = await DB.forM('clients', m.id);
  const cfg = await getConfig();
  const dev = cfg.devise || 'FCFA';
  
  const ca = sales.reduce((s, v) => s + (v.total || 0), 0);
  
  document.getElementById('k-ca').textContent = fmtMoney(ca, dev);
  document.getElementById('k-v').textContent = sales.length;
  document.getElementById('k-p').textContent = prods.length;
  document.getElementById('k-c').textContent = clis.length;
  document.getElementById('w-msg').textContent = cfg.message_accueil || `Bienvenue, ${m.proprietaire} !`;
  document.getElementById('w-date').textContent = new Date().toLocaleDateString('fr-FR', { 
    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' 
  });
  
  const recent = [...sales].sort((a, b) => new Date(b.created_at) - new Date(a.created_at)).slice(0, 5);
  document.getElementById('d-sales').innerHTML = recent.length ? recent.map(s =>
    '<div class="ri"><div><div class="ri-name">' + s.client_nom + '</div><div class="ri-date">' + 
    new Date(s.created_at).toLocaleDateString('fr-FR') + '</div></div><div class="ri-amt">' + 
    fmtMoney(s.total, dev) + '</div></div>'
  ).join('') : '<p class="empty">Aucune vente.</p>';
  
  const ps = {};
  sales.forEach(s => (s.items || []).forEach(i => { 
    if (!ps[i.nom]) ps[i.nom] = { t: 0, q: 0 }; 
    ps[i.nom].t += i.prix * i.qty; 
    ps[i.nom].q += i.qty; 
  }));
  
  const top = Object.entries(ps).sort((a, b) => b[1].t - a[1].t).slice(0, 5);
  document.getElementById('d-top').innerHTML = top.length ? top.map(([n, d]) =>
    '<div class="ri"><div><div class="ri-name">' + n + '</div><div class="ri-date">' + d.q + ' vendu(s)</div></div><div class="ri-amt">' + 
    fmtMoney(d.t, dev) + '</div></div>'
  ).join('') : '<p class="empty">Aucun produit vendu.</p>';
}

// ---- PRODUITS ----
function openProductModal(p) {
  editProdId = p ? p.id : null;
  document.getElementById('mo-prod-title').textContent = p ? 'Modifier' : 'Nouveau produit';
  document.getElementById('p-nom').value = p ? p.nom : '';
  document.getElementById('p-prix').value = p ? p.prix : '';
  document.getElementById('p-stk').value = (p && p.stock != null) ? p.stock : '';
  document.getElementById('p-cat').value = p ? (p.categorie || '') : '';
  document.getElementById('mo-prod').classList.remove('hidden');
}

async function saveProduct() {
  const m = Auth.current(); 
  if (!m) return;
  
  const nom = document.getElementById('p-nom').value.trim();
  const prix = parseFloat(document.getElementById('p-prix').value);
  
  if (!nom || isNaN(prix)) { 
    showToast('⚠️ Nom et prix requis', 'error'); 
    return; 
  }
  
  const stkVal = document.getElementById('p-stk').value;
  const rec = { 
    nom, 
    prix, 
    stock: stkVal === '' ? null : parseInt(stkVal), 
    categorie: document.getElementById('p-cat').value.trim() 
  };
  
  if (editProdId) {
    await DB.update('products', editProdId, rec, m.id);
  } else {
    await DB.insert('products', rec, m.id);
  }
  
  showToast('✅ Produit ' + (editProdId ? 'mis à jour' : 'ajouté'), 'success');
  closeMo('mo-prod'); 
  renderProducts(); 
  renderPOS();
}

async function deleteProduct(id) {
  const m = Auth.current(); 
  if (!confirm('Supprimer ce produit ?')) return;
  await DB.delete('products', id, m.id); 
  showToast('🗑️ Supprimé', 'success'); 
  renderProducts(); 
  renderPOS();
}

async function renderProducts() {
  const m = Auth.current(); 
  if (!m) return;
  
  const prods = await DB.forM('products', m.id);
  const q = (document.getElementById('prod-srch')?.value || '').toLowerCase();
  const f = prods.filter(p => p.nom.toLowerCase().includes(q));
  const dev = (await getConfig()).devise || 'FCFA';
  
  document.getElementById('prod-tbody').innerHTML = f.length ? f.map(p => {
    const sb = p.stock === null ? '<span class="sbdg s-ok">∞</span>' : 
               p.stock === 0 ? '<span class="sbdg s-zero">Rupture</span>' : 
               p.stock <= 5 ? '<span class="sbdg s-low">' + p.stock + '</span>' : 
               '<span class="sbdg s-ok">' + p.stock + '</span>';
    
    return '<tr><td><strong>' + p.nom + '</strong>' + 
           (p.categorie ? '<br/><small style="color:var(--text-dim)">' + p.categorie + '</small>' : '') + 
           '</td><td><strong style="color:var(--accent)">' + fmtMoney(p.prix, dev) + '</strong></td><td>' + sb + 
           '</td><td><div class="tacts"><button class="tbtn" data-edit-pid="' + p.id + '">✏️ Modifier</button>' +
           '<button class="tbtn d" data-del-pid="' + p.id + '">🗑️</button></div></td></tr>';
  }).join('') : '<tr><td colspan="4" class="empty">Aucun produit trouvé.</td></tr>';
  
  document.querySelectorAll('[data-edit-pid]').forEach(btn => {
    btn.onclick = async () => { 
      const p = (await DB.forM('products', m.id)).find(x => x.id === btn.dataset.editPid); 
      if (p) openProductModal(p); 
    };
  });
  
  document.querySelectorAll('[data-del-pid]').forEach(btn => {
    btn.onclick = () => deleteProduct(btn.dataset.delPid);
  });
}

// ---- POS ----
async function renderPOS() {
  const m = Auth.current(); 
  if (!m) return;
  
  const prods = await DB.forM('products', m.id);
  const q = (document.getElementById('pos-srch')?.value || '').toLowerCase();
  const f = prods.filter(p => p.nom.toLowerCase().includes(q));
  const dev = (await getConfig()).devise || 'FCFA';
  
  const catEmos = { boisson: '🥤', plat: '🍽️', dessert: '🍰', pain: '🥖', viande: '🥩', 
                    poisson: '🐟', légume: '🥦', électronique: '📱', vêtement: '👕', 
                    médicament: '💊', chambre: '🛏️' };
  
  const grid = document.getElementById('pos-grid');
  grid.innerHTML = f.length ? f.map(p => {
    const oos = p.stock !== null && p.stock === 0;
    const cat = (p.categorie || '').toLowerCase();
    const emo = Object.entries(catEmos).find(([k]) => cat.includes(k))?.[1] || '📦';
    
    return '<div class="ppc' + (oos ? ' oos' : '') + '" data-pid="' + p.id + '">' +
           '<span class="ppc-emo">' + emo + '</span>' +
           '<div class="ppc-name">' + p.nom + '</div>' +
           '<div class="ppc-price">' + fmtMoney(p.prix, dev) + '</div>' +
           (p.stock !== null ? '<div class="ppc-stk">Stock: ' + p.stock + '</div>' : '') +
           '</div>';
  }).join('') : '<p class="empty">Aucun produit. Ajoutez-en dans Produits.</p>';
  
  grid.onclick = e => { 
    const c = e.target.closest('.ppc'); 
    if (c && !c.classList.contains('oos')) addToCart(c.dataset.pid); 
  };
  
  await fillCliSelect();
}

async function fillCliSelect() {
  const m = Auth.current(); 
  if (!m) return;
  
  const clis = await DB.forM('clients', m.id);
  const sel = document.getElementById('cart-cli-sel');
  if (!sel) return;
  
  const cv = sel.value;
  sel.innerHTML = '<option value="">+ Nouveau client / Saisir manuellement</option>' +
    clis.map(c => '<option value="' + c.id + '">' + c.nom + (c.whatsapp ? ' 📲' : '') + '</option>').join('');
  sel.value = cv;
}

function onCliSelect() {
  waitForFirebase().then(async () => {
    const m = Auth.current(); 
    if (!m) return;
    
    const sel = document.getElementById('cart-cli-sel');
    const cid = sel.value;
    
    if (!cid) {
      document.getElementById('cart-cli-nom').value = '';
      document.getElementById('cart-cli-wa').value = '';
      return;
    }
    
    const cli = (await DB.forM('clients', m.id)).find(c => c.id === cid);
    if (cli) {
      document.getElementById('cart-cli-nom').value = cli.nom;
      document.getElementById('cart-cli-wa').value = cli.whatsapp || '';
    }
  });
}

async function addToCart(pid) {
  const m = Auth.current();
  const ps = await DB.forM('products', m.id);
  const p = ps.find(x => x.id === pid); 
  if (!p) return;
  
  const ex = cart.find(i => i.pid === pid);
  ex ? ex.qty++ : cart.push({ pid, nom: p.nom, prix: p.prix, qty: 1 });
  renderCart();
}

function updCartQty(pid, d) { 
  const i = cart.find(x => x.pid === pid); 
  if (!i) return; 
  i.qty = Math.max(0, i.qty + d); 
  if (i.qty === 0) cart = cart.filter(x => x.pid !== pid); 
  renderCart(); 
}

function rmFromCart(pid) { 
  cart = cart.filter(i => i.pid !== pid); 
  renderCart(); 
}

function clearCart() { 
  cart = []; 
  renderCart(); 
}

function cartTotal() { 
  return cart.reduce((s, i) => s + i.prix * i.qty, 0); 
}

async function renderCart() {
  const cfg = await getConfig();
  const dev = cfg.devise || 'FCFA';
  const tot = cartTotal();
  
  document.getElementById('cart-cnt').textContent = cart.reduce((s, i) => s + i.qty, 0);
  document.getElementById('cart-sub').textContent = fmtMoney(tot, dev);
  document.getElementById('cart-total').textContent = fmtMoney(tot, dev);
  
  const list = document.getElementById('cart-items');
  if (!cart.length) { 
    list.innerHTML = '<p class="empty">Panier vide</p>'; 
    return; 
  }
  
  list.innerHTML = cart.map(i =>
    '<div class="ci"><span class="ci-name">' + i.nom + '</span>' +
    '<div class="ci-ctrls"><button class="ci-qbtn" data-qpid="' + i.pid + '" data-qd="-1">−</button>' +
    '<span class="ci-q">' + i.qty + '</span>' +
    '<button class="ci-qbtn" data-qpid="' + i.pid + '" data-qd="1">+</button></div>' +
    '<span class="ci-price">' + fmtMoney(i.prix * i.qty, dev) + '</span>' +
    '<button class="ci-rm" data-rmpid="' + i.pid + '">✕</button></div>'
  ).join('');
  
  list.querySelectorAll('[data-qpid]').forEach(b => b.onclick = () => updCartQty(b.dataset.qpid, parseInt(b.dataset.qd)));
  list.querySelectorAll('[data-rmpid]').forEach(b => b.onclick = () => rmFromCart(b.dataset.rmpid));
}

// ---- CHECKOUT ----
async function processCheckout() {
  const m = Auth.current(); 
  if (!m) return;
  
  const licSt = getLicStatus(m).st;
  if (licSt === 'expired' || licSt === 'suspended') { 
    showToast('⚠️ Licence expirée. Renouvelez votre abonnement.', 'error'); 
    openPaymentPage();
    return; 
  }
  
  if (!cart.length) { 
    showToast('⚠️ Panier vide', 'error'); 
    return; 
  }
  
  const cfg = await getConfig();
  const dev = cfg.devise || 'FCFA';
  
  const cliSel = document.getElementById('cart-cli-sel').value;
  let cliNom = document.getElementById('cart-cli-nom').value.trim() || 'Client';
  let cliWA = document.getElementById('cart-cli-wa').value.trim().replace(/\D/g, '');
  
  let cliId = cliSel;
  
  if (cliNom && cliNom !== 'Client') {
    if (!cliSel) {
      const newCli = await DB.insert('clients', { nom: cliNom, whatsapp: cliWA }, m.id);
      cliId = newCli.id;
    } else {
      await DB.update('clients', cliSel, { nom: cliNom, whatsapp: cliWA }, m.id);
    }
  }
  
  const tot = cartTotal();
  const sale = await DB.insert('sales', {
    client_id: cliId,
    client_nom: cliNom,
    client_wa: cliWA,
    items: JSON.parse(JSON.stringify(cart)),
    total: tot,
    devise: dev
  }, m.id);
  
  // Mise à jour des stocks
  const allP = await DB.forM('products', m.id);
  cart.forEach(ci => {
    const p = allP.find(p => p.id === ci.pid);
    if (p && p.stock !== null) {
      DB.update('products', ci.pid, { stock: Math.max(0, p.stock - ci.qty) }, m.id);
    }
  });
  
  currentSaleWA = cliWA;
  currentSaleName = cliNom;
  
  setPrintFmt('a4');
  showInvoice(sale, m, cfg);
  
  showToast('🎉 ' + (cfg.message_accueil || `Merci pour votre achat chez ${m.nom_commerce} !`), 'success');
  
  clearCart();
  document.getElementById('cart-cli-sel').value = '';
  document.getElementById('cart-cli-nom').value = '';
  document.getElementById('cart-cli-wa').value = '';
  
  renderPOS();
  renderDashboard();
}

// ---- PRINT ----
function setPrintFmt(fmt) {
  currentPrintFmt = fmt;
  document.querySelectorAll('.fmt-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('fmt-' + fmt)?.classList.add('active');
  
  const lastSale = window._lastSale;
  if (lastSale) showInvoice(lastSale.sale, lastSale.m, lastSale.cfg);
}

function showInvoice(sale, m, cfg) {
  window._lastSale = { sale, m, cfg };
  
  const dev = cfg?.devise || sale.devise || 'FCFA';
  const num = 'DS-' + sale.id.substr(-8).toUpperCase();
  const ds = new Date(sale.created_at).toLocaleDateString('fr-FR', { day: '2-digit', month: 'long', year: 'numeric' });
  const waNum = sale.client_wa || currentSaleWA || '';
  
  const waBtn = document.getElementById('wa-send-btn');
  if (waBtn) waBtn.style.display = waNum ? 'inline-flex' : 'none';
  
  currentSaleWA = waNum;
  currentSaleName = sale.client_nom;
  
  const fmt = currentPrintFmt;
  let html = '';
  
  if (fmt === 'a4') {
    html = '<div class="inv-print-wrap"><div class="inv">' +

// ---- WHATSAPP ----
async function sendWA() {
  const m = Auth.current(); 
  if (!m) return;
  
  const cfg = await getConfig();
  const dev = cfg.devise || 'FCFA';
  
  if (!currentSaleWA) { 
    showToast('⚠️ Pas de numéro WhatsApp pour ce client', 'error'); 
    return; 
  }
  
  const sale = window._lastSale?.sale;
  let msg = cfg.wa_message || 'Merci {nom} pour votre achat de {total} chez {commerce} 🙏 Revenez bientôt !';
  msg = msg.replace('{nom}', currentSaleName || 'cher client')
           .replace('{total}', sale ? fmtMoney(sale.total, dev) : '')
           .replace('{commerce}', m.nom_commerce);
  
  const waUrl = 'https://wa.me/' + currentSaleWA + '?text=' + encodeURIComponent(msg);
  window.open(waUrl, '_blank');
  showToast('📲 WhatsApp ouvert pour ' + currentSaleName, 'wa');
}

async function sendWAMarketing(cliId) {
  const m = Auth.current(); 
  if (!m) return;
  
  const cfg = await getConfig();
  const dev = cfg.devise || 'FCFA';
  const cli = (await DB.forM('clients', m.id)).find(c => c.id === cliId);
  
  if (!cli || !cli.whatsapp) { 
    showToast('⚠️ Pas de WhatsApp pour ce client', 'error'); 
    return; 
  }
  
  let msg = cfg.wa_message || 'Bonjour {nom}, nous avons des offres spéciales chez {commerce} ! Revenez nous voir 😊';
  msg = msg.replace('{nom}', cli.nom).replace('{total}', '').replace('{commerce}', m.nom_commerce);
  
  window.open('https://wa.me/' + cli.whatsapp + '?text=' + encodeURIComponent(msg), '_blank');
  showToast('📲 Message marketing envoyé à ' + cli.nom, 'wa');
}

async function saveClient() {

  if (!m) return;
  
  const nom = document.getElementById('c-nom').value.trim();
  if (!nom) { 
    showToast('⚠️ Nom requis', 'error'); 
    return; 
  }

async function renderClients() {
  const m = Auth.current(); 
  if (!m) return;
  
  const clis = await DB.forM('clients', m.id);
  const q = (document.getElementById('cli-srch')?.value || '').toLowerCase();
  const f = clis.filter(c => c.nom.toLowerCase().includes(q) || (c.whatsapp || '').includes(q));
  
  const sales = await DB.forM('sales', m.id);
  const dev = (await getConfig()).devise || 'FCFA';
  
  document.getElementById('cli-tbody').innerHTML = f.length ? f.map(c => {
    const cs = sales.filter(s => s.client_id === c.id);
    const tot = cs.reduce((s, v) => s + v.total, 0);
    const waBtn = c.whatsapp ? '<button class="tbtn wa" data-wa-cli="' + c.id + '">💬 WA</button>' : '<span style="color:var(--text-dim);font-size:.75rem">—</span>';
    
    return '<tr><td><strong>' + c.nom + '</strong></td><td>' + 
           (c.whatsapp ? '<a href="https://wa.me/' + c.whatsapp + '" target="_blank" style="color:#25D366">+' + c.whatsapp + '</a>' : '—') + 
           '</td><td>' + cs.length + '</td><td><strong style="color:var(--accent)">' + fmtMoney(tot, dev) + '</strong></td>' +
           '<td><div class="tacts">' + waBtn + '<button class="tbtn" data-edit-cid="' + c.id + '">✏️</button>' +
           '<button class="tbtn d" data-del-cid="' + c.id + '">🗑️</button></div></td></tr>';
  }).join('') : '<tr><td colspan="5" class="empty">Aucun client trouvé.</td></tr>';
  
  document.querySelectorAll('[data-wa-cli]').forEach(b => b.onclick = () => sendWAMarketing(b.dataset.waCli));
  document.querySelectorAll('[data-edit-cid]').forEach(b => {
    b.onclick = async () => { 
      const c = (await DB.forM('clients', m.id)).find(x => x.id === b.dataset.editCid); 
      if (c) openClientModal(c); 
    };
  });
  document.querySelectorAll('[data-del-cid]').forEach(b => b.onclick = () => deleteClient(b.dataset.delCid));
}

async function renderSales() {
  const m = Auth.current(); 
  if (!m) return;
  
  const sales = (await DB.forM('sales', m.id)).sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
  const q = (document.getElementById('sale-srch')?.value || '').toLowerCase();

  const dev = (await getConfig()).devise || 'FCFA';
  const tot = f.reduce((s, v) => s + v.total, 0);
  
  document.getElementById('sale-total').textContent = 'Total : ' + fmtMoney(tot, dev);
  
  document.getElementById('sale-tbody').innerHTML = f.length ? f.map((s, i) =>
    '<tr><td><span style="color:var(--text-dim);font-size:.75rem">' + (f.length - i) + '</span></td>' +
    '<td><strong>' + s.client_nom + '</strong></td>' +
    '<td>' + (s.client_wa ? '<a href="https://wa.me/' + s.client_wa + '" target="_blank" style="color:#25D366;font-size:.82rem">+' + s.client_wa + '</a>' : '<span style="color:var(--text-dim)">—</span>') + '</td>' +
    '<td><strong style="color:var(--accent)">' + fmtMoney(s.total, dev) + '</strong></td>' +
    '<td style="font-size:.8rem;color:var(--text-muted)">' + new Date(s.created_at).toLocaleDateString('fr-FR') + '</td>' +
    '<td><div class="tacts"><button class="tbtn" data-inv-sid="' + s.id + '">🧾 Facture</button>' +
    (s.client_wa ? '<button class="tbtn wa" data-wa-sid="' + s.id + '">💬 WA</button>' : '') +
    '</div></td></tr>'
  ).join('') : '<tr><td colspan="6" class="empty">Aucune vente.</td></tr>';
  
  document.querySelectorAll('[data-inv-sid]').forEach(b => b.onclick = () => viewSaleInvoice(b.dataset.invSid));

    b.onclick = async () => {
      const s = (await DB.forM('sales', m.id)).find(x => x.id === b.dataset.waSid);

      currentSaleWA = s.client_wa || '';

async function renderAdminOverview() {
  const merchants = await DB.getMerchants();
  const total = merchants.length;
  let active = 0, expired = 0;
  const plans = ADB.getPlans();
  
  merchants.forEach(m => {
    const s = getLicStatus(m);
    if (s.st === 'active') active++;
    else if (s.st === 'expired' || s.st === 'grace') expired++;
  });
  
  document.getElementById('ak-total').textContent = total;
  document.getElementById('ak-active').textContent = active;
  document.getElementById('ak-expired').textContent = expired;
  
  const expiring = merchants.filter(m => {
    if (!m.licence_expiry) return false;
    const d = Math.ceil((new Date(m.licence_expiry) - new Date()) / 86400000);
    return d >= 0 && d <= 7;
  }).sort((a, b) => new Date(a.licence_expiry) - new Date(b.licence_expiry));
  
  document.getElementById('ak-expiring').innerHTML = expiring.length ? expiring.map(m => {
    const d = Math.ceil((new Date(m.licence_expiry) - new Date()) / 86400000);
    return '<div class="activity-item"><div class="act-dot orange"></div><div class="act-txt"><strong>' + 
           m.nom_commerce + '</strong> — ' + m.ville + '<br/><span style="font-size:.73rem;color:#64748B">Expire dans ' + d + ' jour(s)</span></div>' +
           '<button class="btn-p sm" onclick="openMerchDetail(\'' + m.id + '\')">Gérer</button></div>';
  }).join('') : '<p style="color:#374151;font-size:.82rem">Aucune expiration dans les 7 prochains jours.</p>';
  
  const recent = [...merchants].sort((a, b) => new Date(b.created_at) - new Date(a.created_at)).slice(0, 5);
  document.getElementById('ak-recent').innerHTML = recent.length ? recent.map(m =>
    '<div class="activity-item"><div class="act-dot blue"></div><div class="act-txt"><strong>' + m.nom_commerce + '</strong><br/><span style="font-size:.73rem;color:#64748B">' + 
    m.ville + ' · ' + new Date(m.created_at).toLocaleDateString('fr-FR') + '</span></div></div>'
  ).join('') : '<p style="color:#374151;font-size:.82rem">Aucun commerce.</p>';
}

  document.getElementById('adm-merch-tbody').innerHTML = f.length ? f.map(m => {

    const exp = m.licence_expiry ? new Date(m.licence_expiry).toLocaleDateString('fr-FR') : '—';

    return '<tr><td><strong style="color:#E2E8F0">' + m.nom_commerce + '</strong><br/><span style="font-size:.72rem;color:#475569">' + 
           m.telephone + '</span></td><td>' + m.proprietaire + '</td><td>' + m.ville + '</td>' +
           '<td><span style="font-size:.78rem;color:#64748B">' + planLabel + '</span></td>' +
           '<td><span class="sbadge ' + s.st + '">' + s.lbl + '</span></td>' +

async function openMerchDetail(mid) {
  const m = (await DB.getMerchants()).find(x => x.id === mid); 
  if (!m) return;
  
  currentMerchDetailId = mid;
  const s = getLicStatus(m);
  const exp = m.licence_expiry ? new Date(m.licence_expiry).toLocaleDateString('fr-FR') : '—';
  const days = m.licence_expiry ? Math.max(0, Math.ceil((new Date(m.licence_expiry) - new Date()) / 86400000)) : 0;
  
  document.getElementById('md-title').textContent = m.nom_commerce;
  document.getElementById('md-info').innerHTML = [
    ['Commerce', m.nom_commerce],
    ['Propriétaire', m.proprietaire],
    ['Téléphone', m.telephone],
    ['Ville', m.ville],
    ['Type', m.type],
    ['Statut', '<span class="sbadge ' + s.st + '">' + s.lbl + '</span>'],
    ['Expiration', exp],
    ['Jours restants', days + ' j'],
    ['Plan', m.plan_type || 'mensuel'],
    ['Inscrit le', new Date(m.created_at).toLocaleDateString('fr-FR')]
  ].map(([l, v]) => '<div class="merch-detail-row"><label>' + l + '</label><span>' + v + '</span></div>').join('');
  
  const suspBtn = document.getElementById('md-suspend-btn');
  if (suspBtn) suspBtn.textContent = m.actif === false ? 'Réactiver' : 'Suspendre';
  
  document.getElementById('mo-merch-detail').classList.remove('hidden');
}

async function extendMerchant() {
  if (!currentMerchDetailId) return;
  
  const planSel = document.getElementById('md-extend-plan').value;
  let days = parseInt(planSel);
  
  if (planSel === 'custom') {
    days = parseInt(document.getElementById('md-custom-days').value);
    if (isNaN(days) || days < 1) {
      showToast('⚠️ Entrez un nombre de jours valide', 'error');
      return;
    }
  }
  
  const m = await DB.getMerchantById(currentMerchDetailId);
  if (!m) return;
  
  const base = m.licence_expiry && new Date(m.licence_expiry) > new Date() ? new Date(m.licence_expiry) : new Date();
  base.setDate(base.getDate() + days);
  const planType = days >= 300 ? 'annuel' : 'mensuel';
  
  await DB.updateMerchant(currentMerchDetailId, {
    licence: 'active',
    actif: true,
    licence_expiry: base.toISOString(),
    plan_type: planType
  });
  
  await ADB.addActivity('extend', `Abonnement ${m.nom_commerce} prolongé de ${days} jours`);
  showAdminToast('✅ Abonnement activé pour ' + days + ' jours', 'success');
  closeMo('mo-merch-detail');
  renderAdminMerchants();
  renderAdminOverview();
}

async function suspendMerchant() {
  if (!currentMerchDetailId) return;
  
  const m = await DB.getMerchantById(currentMerchDetailId);
  if (!m) return;
  
  const isSuspended = m.actif === false;
  await DB.updateMerchant(currentMerchDetailId, {
    actif: !isSuspended,
    licence: isSuspended ? 'active' : 'suspendue'
  });
  
  await ADB.addActivity(isSuspended ? 'reactivate' : 'suspend', 
                       (isSuspended ? 'Réactivation' : 'Suspension') + ' de ' + m.nom_commerce);
  
  showAdminToast(isSuspended ? '✅ Commerce réactivé' : '🔒 Commerce suspendu', 'success');
  closeMo('mo-merch-detail');
  renderAdminMerchants();
}

async function renderAdminPayments() {
  const reqs = await ADB.getPayReqs();
  const filtered = currentPayFilter === 'all' ? reqs : reqs.filter(r => r.statut === currentPayFilter);
  
  const container = document.getElementById('adm-pay-list');
  container.innerHTML = filtered.length ? filtered.map(r => buildPayReqCard(r)).join('') : 
    '<div style="text-align:center;padding:40px;color:#374151;font-size:.85rem">Aucune demande.</div>';
}

function buildPayReqCard(r) {
  const plans = ADB.getPlans();
  const plan = plans[r.plan] || { label: r.plan, prix: r.montant };
  const opColor = r.operateur === 'orange' ? '#FF8C00' : '#0064C8';
  const opIco = r.operateur === 'orange' ? '🟠' : '🔵';
  
  const actions = r.statut === 'pending' ?
    '<button class="btn-p sm" data-validate="' + r.id + '">✅ Valider</button>' +
    '<button style="background:rgba(231,76,60,.15);color:#E74C3C;border:1px solid rgba(231,76,60,.3);padding:5px 12px;border-radius:6px;font-size:.78rem;cursor:pointer" data-reject="' + r.id + '">❌ Rejeter</button>' : '';
  
  return '<div class="pay-req ' + r.statut + '">' +
    '<div class="pay-req-info">' +
      '<div class="pay-req-name">' + r.nom_commerce + '</div>' +
      '<div class="pay-req-meta">' +
        '<span>' + opIco + ' ' + (r.operateur ? r.operateur.charAt(0).toUpperCase() + r.operateur.slice(1) : '') + '</span>' +
        '<span style="color:#E8730C;font-weight:700">' + fmtMoney(r.montant, 'FCFA') + '</span>' +
        '<span>' + plan.label + '</span>' +
        '<span>' + new Date(r.created_at).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' }) + '</span>' +
      '</div>' +
      '<div class="pay-req-ref">Réf: ' + (r.reference || '') + '</div>' +
      (r.trans_ref ? '<div class="pay-req-ref" style="color:#4FC3F7">Trans: ' + r.trans_ref + '</div>' : '') +
    '</div>' +
    '<div class="pay-req-acts" style="align-items:center;gap:8px;display:flex">' +
      '<span class="sbadge ' + r.statut + '">' + 
        { pending: 'En attente', validated: 'Validé', rejected: 'Rejeté' }[r.statut] + 
      '</span>' +
      actions +
    '</div>' +
  '</div>';
}

async function validatePayment(id) {
  const reqs = await ADB.getPayReqs();
  const req = reqs.find(r => r.id === id); 
  if (!req) return;
  
  const m = await DB.getMerchantById(req.merchant_id);
  if (m) {
    const plans = ADB.getPlans();
    const plan = plans[req.plan] || { jours: 30 };
    const base = m.licence_expiry && new Date(m.licence_expiry) > new Date() ? new Date(m.licence_expiry) : new Date();
    base.setDate(base.getDate() + plan.jours);
    
    await DB.updateMerchant(req.merchant_id, {
      licence: 'active',
      actif: true,
      licence_expiry: base.toISOString(),
      plan_type: req.plan
    });
  }
  
  await ADB.updatePayReq(id, { statut: 'validated', validated_at: new Date().toISOString() });
  await ADB.addActivity('validated', `Paiement validé — ${req.nom_commerce} (${fmtMoney(req.montant, 'FCFA')})`);
  
  const cm = Auth.current();
  if (cm && cm.id === req.merchant_id) {
    const updated = await DB.getMerchantById(req.merchant_id);
    if (updated) sessionStorage.setItem('ds_m', JSON.stringify(updated));
  }
  
  showAdminToast('✅ Abonnement activé pour ' + req.nom_commerce, 'success');
  renderAdminPayments();
  renderAdminOverview();
}

async function rejectPayment(id) {
  if (!confirm('Rejeter cette demande de paiement ?')) return;
  
  const reqs = await ADB.getPayReqs();
  const req = reqs.find(r => r.id === id); 
  if (!req) return;
  
  await ADB.updatePayReq(id, { statut: 'rejected', rejected_at: new Date().toISOString() });
  await ADB.addActivity('rejected', `Paiement rejeté — ${req.nom_commerce}`);
  showAdminToast('❌ Demande rejetée', 'error');
  renderAdminPayments();
}

function selectPlan(p) {
  payState.plan = p;
  document.querySelectorAll('.plan-opt').forEach(el => el.classList.toggle('selected', el.dataset.plan === p));
}

function selectOperator(op) {
  payState.operator = op;
  renderPayOpGrid();
}

function goToPayStep(step) {
  ['plan', 'operator', 'instructions', 'submitted'].forEach(s => {
    const el = document.getElementById('pay-step-' + s);
    if (el) el.style.display = s === step ? 'block' : 'none';
  });
  
  const steps = ['plan', 'operator', 'instructions', 'submitted'];
  const idx = steps.indexOf(step);
  
  ['pp1', 'pp2', 'pp3', 'pp4'].forEach((id, i) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.className = 'pp-step' + (i < idx ? ' done' : i === idx ? ' active' : '');
    el.querySelector('.pp-dot').textContent = i < idx ? '✓' : (i + 1);
  });
  
  if (step === 'instructions') buildPayInstructions();
}

function confirmOperatorAndContinue() {
  if (!payState.operator) {
    showToast('⚠️ Veuillez sélectionner un opérateur', 'error');
    return;
  }
  goToPayStep('instructions');
}

async function buildPayInstructions() {
  if (!payState.plan) { goToPayStep('plan'); return; }
  if (!payState.operator) { goToPayStep('operator'); return; }
  
  const cfg = await ADB.getCfg();
  const plans = ADB.getPlans();
  const plan = plans[payState.plan];
  const isOrange = payState.operator === 'orange';
  
  const num = isOrange ? (cfg.orange_num || '') : (cfg.moov_num || '');
  const ussd = isOrange ? (cfg.orange_ussd || '*144#') : (cfg.moov_ussd || '*555#');
  
  const m = Auth.current();
  const suffix = (m?.nom_commerce || 'DS').replace(/\s/g, '').slice(0, 3).toUpperCase();
  payState.ref = 'DS-' + Date.now().toString(36).toUpperCase().slice(-6) + '-' + suffix;
  
  document.getElementById('pay-op-ico').textContent = isOrange ? '🟠' : '🔵';
  document.getElementById('ussd-code').textContent = ussd;
  document.getElementById('pay-dest-num').textContent = num || '⚠️ Non configuré — contactez le support';
  document.getElementById('pay-amount-display').textContent = fmtMoney(plan.prix, 'FCFA');
  document.getElementById('pay-ref-code').textContent = payState.ref;
  document.getElementById('pay-trans-ref').value = '';
}

async function submitPayment() {
  const m = Auth.current();
  if (!m) return;
  
  const transRef = document.getElementById('pay-trans-ref').value.trim();
  if (!transRef) {
    showToast('⚠️ Entrez la référence de votre transaction', 'error');
    return;
  }
  
  const plans = ADB.getPlans();
  const plan = plans[payState.plan];
  payState.transRef = transRef;
  
  const req = await ADB.addPayReq({
    merchant_id: m.id,
    nom_commerce: m.nom_commerce,
    ville: m.ville,
    plan: payState.plan,
    montant: plan.prix,
    operateur: payState.operator,
    reference: payState.ref,
    trans_ref: transRef
  });
  
  await ADB.addActivity('payment_request', `Demande paiement de ${m.nom_commerce} — ${fmtMoney(plan.prix, 'FCFA')} via ${payState.operator}`);
  
  goToPayStep('submitted');
  document.getElementById('pay-submitted-ref').textContent = payState.ref;
  
  const cfg = await ADB.getCfg();
  const waBtn = document.getElementById('pay-wa-support-btn');
  
  if (cfg.wa_support) {
    const msg = 'Bonjour, j\'ai effectué un paiement pour Digitale Solution.\nCommerce: ' + m.nom_commerce + 
                '\nRéférence: ' + payState.ref + '\nTransaction: ' + transRef + 
                '\nMontant: ' + fmtMoney(plan.prix, 'FCFA') + '\nOpérateur: ' + payState.operator;
    
    waBtn.onclick = () => window.open('https://wa.me/' + cfg.wa_support + '?text=' + encodeURIComponent(msg), '_blank');
    waBtn.style.display = 'flex';
  } else {
    waBtn.style.display = 'none';
  }
  
  showToast('✅ Demande envoyée ! Vérification sous 24h.', 'success');
}

  }
}

document.addEventListener('DOMContentLoaded', async () => {
  console.log('🚀 Démarrage de Digitale Solution...');
  
  // Appliquer le thème sauvegardé
  const savedTheme = localStorage.getItem('ds_theme') || 'dark';
  setTheme(savedTheme, null);
  
  // Attendre que Firebase soit prêt
  await waitForFirebase();
  
  // Initialiser les données admin
  await ADB.initDefaults();
  
  // Vérifier le token admin dans l'URL
  const params = new URLSearchParams(window.location.search);
  const urlToken = params.get('admin');
  
  if (urlToken) {
    const cfg = await ADB.getCfg();
    if (urlToken === (cfg.token || 'DIGITALE')) {
      if (AdminAuth.isLogged()) {
        showPage('page-admin');
        adminSection('overview');
      } else {
        showPage('page-admin-login');
        setTimeout(() => document.getElementById('adm-pwd')?.focus(), 200);
      }
    } else {
      console.warn('Token admin invalide');
      const m = Auth.current();
      showPage(m ? 'page-app' : 'page-landing');
    }
  } else {
    const m = Auth.current();
    if (m) {
      showPage('page-app');
      initRealtimeSubscriptions();
    } else {
      showPage('page-landing');
    }
  }
  
  console.log('✅ Application prête');
});
